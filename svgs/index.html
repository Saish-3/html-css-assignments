<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SVG Animations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SVG Animations</h1>

    <svg width="400" height="300" viewBox="0 0 400 300">

        <!-- Animated Circle -->
        <circle cx="80" cy="150" r="30" class="circle"/>

        <!-- Rotating Square -->
        <rect x="170" y="120" width="60" height="60" class="square"/>

        <!-- Moving Line -->
        <line x1="300" y1="50" x2="300" y2="250" class="line"/>

    </svg>

</body>
</html>
