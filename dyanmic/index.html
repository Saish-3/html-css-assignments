<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">


        <nav class="navbar">
            <div class="logo">Notion</div>

            <ul class="nav-links">
                <li>Features</li>
                <li>Teams</li>
                <li>Enterprise</li>
                <li>Pricing</li>
            </ul>

            <div class="nav-buttons">
                <a href="#" class="login">Log in</a>
                <a href="#" class="nav-btn">Get Notion free</a>
            </div>
        </nav>

      
        <div class="hero">

            <div class="left">
                <h1>
                    Build <br>
                    something <br>
                    beautiful.
                </h1>

                <p>
                    Notion will help you and your team get more done with less effort.
                </p>

                <div class="hero-buttons">
                    <a href="#" class="primary-btn">Get Notion free</a>
                    <a href="#" class="demo-link">Request a demo</a>
                </div>

                <div class="trusted">
                    <p>Trusted by teams at</p>
                    <span>Netflix</span>
                    <span>Amazon</span>
                    <span>Figma</span>
                </div>
            </div>

            <div class="right">
                <img src="image.jpg" alt="Kids Illustration">
            </div>

        </div>

    </div>

</body>
</html>
